<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Mary Holst" />
    <meta name="description" content="image gallery with history" />
    <title>Spots</title>
    <link rel="stylesheet" href="pages/index.css" />
    <link rel="favicon" href="favicon.ico" />
  </head>
  <body>
    <div class="page">
   <header class="header">
    <img class="header__logo" src="./images/logo.svg" alt="spots logo" />
   </header>
   <main class="content">
    <section class="profile page__section">
      <img class="profile__avatar" src="./images/avatar.jpg" alt="avatar profile image" />
      <div class="profile__column">
      <h1 class="profile__name">Bessie Coleman</h1>
      <p class="profile__description">Civil Aviator</p>
      <button class="profile__edit-btn" type="button">
        <img src="./images/edit.svg" alt="edit icon" class="profile__edit-icon"/>
        <span class="profile__edit-text">Edit Profile</span>
      </button>
      </div>
      <button class="profile__add-btn" type="button">
        <img src="./images/plus.svg" alt="plus icon" class="profile__add-icon" /> <span class="profile__add-text">New Post</span>
      </button>
    </section>
    <section class="cards page__section">
      <ul class="cards__list">
        <li class="card">
          <img src="./images/1-photo-by-moritz-feldmann-from-pexels.jpg" alt="Val Thorens" class="card__image" />
          <div class="card__content">
            <h2 class="card__title">Val Thorens</h2>
            <button class="card__like-button" type="button">
            </button>
          </div>
        </li>
        <li class="card">
          <img src="./images/2-photo-by-ceiline-from-pexels.jpg" alt="Val Thorens" class="card__image" />
          <div class="card__content">
            <h2 class="card__title">Restaurant terrace</h2>
            <button class="card__like-button" type="button">
            </button>
          </div>
        </li><li class="card">
          <img src="./images/3-photo-by-tubanur-dogan-from-pexels.jpg" alt="Val Thorens" class="card__image" />
          <div class="card__content">
            <h2 class="card__title">An outdoor cafe</h2>
            <button class="card__like-button" type="button">
            </button>
          </div>
        </li><li class="card">
          <img src="./images/4-photo-by-maurice-laschet-from-pexels.jpg" alt="Val Thorens" class="card__image" />
          <div class="card__content">
            <h2 class="card__title">A very long bridge, over the forest</h2>
            <button class="card__like-button" type="button">
            </button>
          </div>
        </li><li class="card">
          <img src="./images/5-photo-by-van-anh-nguyen-from-pexels.jpg" alt="Val Thorens" class="card__image" />
          <div class="card__content">
            <h2 class="card__title">Tunnel with morning light</h2>
            <button class="card__like-button" type="button">
            </button>
          </div>
        </li><li class="card">
          <img src="./images/6-photo-by-moritz-feldmann-from-pexels.jpg" alt="Val Thorens" class="card__image" />
          <div class="card__content">
            <h2 class="card__title">Mountain house</h2>
            <button class="card__like-button" type="button">
            </button>
          </div>
        </li>
      </ul>
    </section>
   </main>
   <footer class="footer">
    <img src="./images/footer-copyright.svg" alt="copyright" class="footer__copyright"/>
   </footer>
    </div>
  </body>
</html>
