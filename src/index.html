<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Mary Holst" />
    <meta name="description" content="image gallery with history" />
    <title>Spots</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img class="header__logo" src="./images/logo.svg" alt="spots logo" />
      </header>
      <main class="content">
        <section class="profile page__section">
          <img
            class="profile__avatar"
            src="./images/avatar.jpg"
            alt="avatar profile image"
          />
          <div class="profile__column">
            <h1 class="profile__name">Bessie Coleman</h1>
            <p class="profile__description">Civil Aviator</p>
            <button class="profile__edit-btn" type="button">
              <img
                src="./images/edit.svg"
                alt="edit icon"
                class="profile__edit-icon"
              />
              <span class="profile__edit-text">Edit Profile</span>
            </button>
          </div>
          <button class="profile__add-btn" type="button">
            <img
              src="./images/plus.svg"
              alt="plus icon"
              class="profile__add-icon"
            />
            <span class="profile__add-text">New Post</span>
          </button>
        </section>
        <section class="cards page__section">
          <template id="card-template">
            <li class="card">
              <button class="card__delete-button" type="button"></button>
              <img src="#" alt="" class="card__image" />
              <div class="card__content">
                <h2 class="card__title"></h2>
                <button class="card__like-button" type="button"></button>
              </div>
            </li>
          </template>
          <ul class="cards__list"></ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">2023 &copy; Spots</p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <button class="modal__close" type="button">
            <img
              class="modal__close-img"
              src="./images/close2.png"
              alt="close button"
            />
          </button>
          <h2 class="modal__title">Edit Profile</h2>
          <form class="modal__form">
            <label for="name-input" class="modal__label">
              Name
              <input
                required
                id="name-input"
                type="text"
                class="modal__input"
                placeholder="Your name"
                minlength="2"
                maxlength="40"
              />
              <span id="name-input-error" class="modal__error"></span>
            </label>
            <label for="description-input" class="modal__label">
              Description
              <input
                required
                id="description-input"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
                minlength="2"
                maxlength="200"
              />
              <span id="description-input-error" class="modal__error"></span>
            </label>
            <button class="modal__btn" type="submit">
              <span class="modal__btn-text">Save</span>
            </button>
          </form>
        </div>
      </div>
      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <button class="modal__close" type="button">
            <img
              class="modal__close-img"
              src="./images/close2.png"
              alt="close button"
            />
          </button>
          <h2 class="modal__title">New post</h2>
          <form class="modal__form">
            <label for="card-image" class="modal__label">
              Image link
              <input
                required
                id="card-image"
                type="url"
                class="modal__input"
                placeholder="Paste a link to the picture"
              />
              <span id="card-image-error" class="modal__error"></span>
            </label>
            <label for="card-caption" class="modal__label">
              Caption
              <input
                required
                id="card-caption"
                type="text"
                class="modal__input"
                placeholder="Type your caption"
                minlength="2"
                maxlength="30"
              />
              <span id="card-caption-error" class="modal__error"></span>
            </label>
            <button class="modal__btn" type="submit">
              <span class="modal__btn-text">Save</span>
            </button>
          </form>
        </div>
      </div>
      <div class="modal" id="modal__delete">
        <div class="modal__container">
          <button class="modal__close" aria-label="Close modal" type="button"></button>
          <h2 class="modal__text">Are you sure you want to delete this image?</h2>
          <button class="modal__delete-btn"
          type="button"
          >Delete</button>
          <button class="modal__cancel-btn"
          type="button">Cancel</button>
        </div>
      </div>
      <div class="modal" id="preview-modal">
        <div class="modal__image-container">
          <button
            class="modal__close modal__close_type_preview"
            aria-label="Close modal"
            type="button"
          ></button>
          <img
            class="modal__image"
            src="https://practicum-content.s3.us-west-1.amazonaws.com/software-engineer/spots/7-photo-by-griffin-wooldridge-from-pexels.jpg"
            alt="preview image"
          />
          <p class="modal__caption">Golden Gate Bridge</p>
        </div>
      </div>
    </div>
  </body>
</html>
